# ============================================================
#  Auto-MHXY 应用配置
# ============================================================

# 模拟模式：true = 生成测试画面（无需采集卡），false = 使用真实设备
simulate: true

# 模拟器设置（仅 simulate=true 时生效）
simulation:
  fps: 30                   # 模拟帧率
  phoneWidth: 1400          # 模拟手机屏幕宽度（在采集画面内）
  phoneHeight: 840          # 模拟手机屏幕高度

# 设备配置
device:
  name: "auto"              # "auto"=自动检测第一个设备，或填写采集卡名称
  captureWidth: 1920        # 采集分辨率-宽
  captureHeight: 1080       # 采集分辨率-高
